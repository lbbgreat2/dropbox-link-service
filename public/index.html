<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Dropbox文件中心 | 稳定版</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0061ff 0%, #60efff 100%);
            min-height: 100vh;
            color: #333;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }
        
        header h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        
        header p {
            font-size: 1.2rem;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto 20px;
        }
        
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #48bb78;
            margin-right: 8px;
        }
        
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        
        @media (max-width: 768px) {
            .card-grid {
                grid-template-columns: 1fr;
            }
            header h1 {
                font-size: 2.2rem;
            }
        }
        
        .folder-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        
        .folder-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        
        .card-icon {
            background: linear-gradient(135deg, #0061ff, #60efff);
            width: 60px;
            height: 60px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .card-icon i {
            font-size: 1.8rem;
            color: white;
        }
        
        .card-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: #2d3748;
        }
        
        .card-desc {
            color: #718096;
            line-height: 1.6;
            margin-bottom: 20px;
            flex-grow: 1;
        }
        
        .card-meta {
            font-size: 0.9rem;
            color: #a0aec0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }
        
        .card-meta i {
            margin-right: 8px;
        }
        
        .access-btn {
            background: linear-gradient(135deg, #0061ff, #60efff);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            text-decoration: none;
            text-align: center;
            width: 100%;
        }
        
        .access-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #0052d4, #4fd8ff);
            box-shadow: 0 5px 15px rgba(0, 97, 255, 0.4);
        }
        
        .access-btn:disabled {
            background: #cccccc;
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        .access-btn i {
            margin-right: 10px;
        }
        
        .loading {
            display: none;
            font-size: 0.9rem;
            color: #0061ff;
            margin-top: 10px;
            text-align: center;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .link-status {
            margin-top: 10px;
            font-size: 12px;
            min-height: 20px;
        }
        
        .status-text {
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 11px;
            display: inline-block;
        }
        
        .status-valid {
            background-color: rgba(76, 175, 80, 0.1);
            color: #2e7d32;
        }
        
        .status-checking {
            background-color: rgba(33, 150, 243, 0.1);
            color: #1565c0;
        }
        
        .status-invalid {
            background-color: rgba(244, 67, 54, 0.1);
            color: #d32f2f;
        }
        
        .refresh-btn {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .refresh-btn:hover:not(:disabled) {
            background-color: rgba(255, 255, 255, 0.3);
        }
        
        .refresh-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .error-message {
            display: none;
            background: #fed7d7;
            color: #c53030;
            padding: 12px 16px;
            border-radius: 8px;
            margin: 15px 0;
            font-size: 0.9rem;
        }
        
        footer {
            text-align: center;
            margin-top: 50px;
            color: white;
            opacity: 0.8;
            font-size: 0.9rem;
        }
        
        .shared-badge {
            background-color: #e8f4ff;
            color: #0061ff;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: inline-block;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-cloud"></i> Dropbox文件中心</h1>
            <p>通过永久链接访问您的Dropbox文件。链接失效时会自动提示。</p>
            <div style="margin-top: 10px;">
                <span class="status-indicator"></span>
                <span id="status-text">正在初始化...</span>
            </div>
            
            <div id="error-message" class="error-message"></div>
        </header>
        
        <main id="card-container" class="card-grid">            
            <!-- ENJOY AI 共享文件夹 -->
            <div class="folder-card" data-folder-id="enjoy_ai">
                <div class="card-icon">
                    <i class="fas fa-share-alt"></i>
                </div>
                <h3 class="card-title">ENJOY AI
                    <span class="shared-badge">共享 • 5个项目</span>
                </h3>
                <p class="card-desc">ENJOY AI项目的共享文件夹。包含5个项目，包括项目文件、数据集和资源。</p>
                <div class="card-meta">
                    <i class="fas fa-users"></i> 共享文件夹
                </div>
                <button class="access-btn" onclick="handleFolderClick('enjoy_ai')">
                    <span class="btn-text">打开文件夹</span>
                </button>
                <div class="link-status">
                    <span id="status-enjoy_ai" class="status-text status-checking">
                        准备就绪
                    </span>
                </div>
                <div id="loading-enjoy_ai" class="loading">
                    <i class="fas fa-spinner fa-spin"></i> 正在处理...
                </div>
            </div>
            
            <!-- WhalesBot 共享文件夹 -->
            <div class="folder-card" data-folder-id="whalesbot">
                <div class="card-icon">
                    <i class="fas fa-robot"></i>
                </div>
                <h3 class="card-title">WhalesBot
                    <span class="shared-badge">共享 • 14个项目</span>
                </h3>
                <p class="card-desc">WhalesBot项目的共享文件夹。包含14个项目，包括代码、资源和项目文件。</p>
                <div class="card-meta">
                    <i class="fas fa-users"></i> 共享文件夹
                </div>
                <button class="access-btn" onclick="handleFolderClick('whalesbot')">
                    <span class="btn-text">打开文件夹</span>
                </button>
                <div class="link-status">
                    <span id="status-whalesbot" class="status-text status-checking">
                        准备就绪
                    </span>
                </div>
                <div id="loading-whalesbot" class="loading">
                    <i class="fas fa-spinner fa-spin"></i> 正在处理...
                </div>
            </div>
        </main>
        
        <button id="refresh-btn" class="refresh-btn" onclick="checkAllLinks()">
            <i class="fas fa-sync-alt"></i> 检测链接状态
        </button>
        
        <footer>
            <p>© 2024 Dropbox永久链接服务 | 稳定版</p>
            <p>系统自动检测链接状态，失效链接将被禁用并提示。</p>
        </footer>
    </div>
    
    <script>
        const API_BASE_URL = window.location.origin;
        let linkStatusCache = {};
        
        // 当前可用的文件夹ID列表 (已更新，仅包含enjoy_ai和whalesbot)
        const CURRENT_FOLDER_IDS = ['enjoy_ai', 'whalesbot'];
        
        function showError(message) {
            const errorEl = document.getElementById('error-message');
            errorEl.textContent = '⚠️ ' + message;
            errorEl.style.display = 'block';
            
            setTimeout(() => {
                errorEl.style.display = 'none';
            }, 5000);
        }
        
        async function handleFolderClick(folderId) {
            const button = document.querySelector(`[data-folder-id="${folderId}"] .access-btn`);
            const btnText = button.querySelector('.btn-text');
            const loadingEl = document.getElementById(`loading-${folderId}`);
            const statusEl = document.getElementById(`status-${folderId}`);
            
            button.disabled = true;
            btnText.innerHTML = '<span class="loading-spinner"></span>处理中...';
            if (loadingEl) loadingEl.style.display = 'block';
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/link/${folderId}`);
                
                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error('链接不存在或已失效');
                    } else {
                        throw new Error(`服务器错误: ${response.status}`);
                    }
                }
                
                const data = await response.json();
                
                if (data && data.url) {
                    window.open(data.url, '_blank');
                    
                    statusEl.textContent = '✅ 链接有效';
                    statusEl.className = 'status-text status-valid';
                    
                    // 简化：现在只有文件夹，没有单独的视频文件
                    btnText.textContent = '打开文件夹';
                    setTimeout(() => {
                        button.disabled = false;
                    }, 1000);
                } else {
                    throw new Error('链接数据格式错误');
                }
            } catch (error) {
                console.error('打开链接失败:', error);
                
                statusEl.textContent = '❌ 链接失效';
                statusEl.className = 'status-text status-invalid';
                
                showError(`无法访问文件: ${error.message}`);
                btnText.textContent = '打开文件夹'; // 统一恢复为"打开文件夹"
                button.disabled = false;
            } finally {
                if (loadingEl) loadingEl.style.display = 'none';
            }
        }
        
        async function checkAllLinks() {
            const refreshBtn = document.getElementById('refresh-btn');
            const originalText = refreshBtn.innerHTML;
            
            refreshBtn.disabled = true;
            refreshBtn.innerHTML = '<span class="loading-spinner"></span>检测中...';
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/links/status`);
                
                if (!response.ok) {
                    if (response.status === 404) {
                        useFallbackMode();
                        refreshBtn.innerHTML = '<i class="fas fa-sync-alt"></i> 检测链接状态';
                        refreshBtn.disabled = false;
                        return;
                    }
                    throw new Error(`状态检测失败: ${response.status}`);
                }
                
                const data = await response.json();
                
                if (data.success && data.data) {
                    linkStatusCache = data.data;
                    
                    // 只处理当前存在的文件夹
                    CURRENT_FOLDER_IDS.forEach(folderId => {
                        const button = document.querySelector(`[data-folder-id="${folderId}"] .access-btn`);
                        const statusEl = document.getElementById(`status-${folderId}`);
                        
                        if (linkStatusCache[folderId] && linkStatusCache[folderId].valid) {
                            button.disabled = false;
                            statusEl.textContent = '✅ 链接正常';
                            statusEl.className = 'status-text status-valid';
                        } else {
                            button.disabled = true;
                            statusEl.textContent = '❌ 链接失效';
                            statusEl.className = 'status-text status-invalid';
                        }
                    });
                }
            } catch (error) {
                console.error('检测链接状态失败:', error);
                useFallbackMode();
            } finally {
                setTimeout(() => {
                    refreshBtn.innerHTML = originalText;
                    refreshBtn.disabled = false;
                }, 1000);
            }
        }
        
        function useFallbackMode() {
            // 只对当前存在的文件夹启用降级模式
            CURRENT_FOLDER_IDS.forEach(folderId => {
                const button = document.querySelector(`[data-folder-id="${folderId}"] .access-btn`);
                const statusEl = document.getElementById(`status-${folderId}`);
                
                if (button && statusEl) {
                    button.disabled = false;
                    statusEl.textContent = '⚠️ 直接访问';
                    statusEl.className = 'status-text status-checking';
                }
            });
            
            console.log('使用降级模式：跳过链接状态检测');
        }
        
        async function checkHealth() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/health`);
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('status-text').textContent = '服务状态正常';
                    document.querySelector('.status-indicator').style.backgroundColor = '#48bb78';
                    
                    setTimeout(() => checkAllLinks(), 1000);
                    
                    return true;
                }
            } catch (error) {
                console.log('健康检查失败:', error);
            }
            
            document.getElementById('status-text').textContent = '服务连接异常';
            document.querySelector('.status-indicator').style.backgroundColor = '#f56565';
            
            useFallbackMode();
            return false;
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            useFallbackMode();
            
            checkHealth();
            
            console.log('页面初始化完成，API地址:', API_BASE_URL);
            console.log('当前可用文件夹:', CURRENT_FOLDER_IDS);
        });
        
        window.addEventListener('offline', () => {
            showError('网络连接已断开，请检查网络设置');
        });
        
        window.addEventListener('online', () => {
            document.getElementById('error-message').style.display = 'none';
        });
    </script>
</body>
</html>
