<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropbox文件中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #0061ff 0%, #60efff 100%); min-height: 100vh; color: #333; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 40px; color: white; }
        header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        header p { font-size: 1.1rem; opacity: 0.9; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; margin-bottom: 30px; }
        @media (max-width: 768px) { .card-grid { grid-template-columns: 1fr; } }
        .folder-card { background: white; border-radius: 16px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); transition: transform 0.3s ease; display: flex; flex-direction: column; }
        .folder-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .card-icon { background: linear-gradient(135deg, #0061ff, #60efff); width: 60px; height: 60px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .card-icon i { font-size: 1.8rem; color: white; }
        .card-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 10px; color: #2d3748; }
        .card-desc { color: #718096; line-height: 1.6; margin-bottom: 20px; flex-grow: 1; }
        .access-btn { background: linear-gradient(135deg, #0061ff, #60efff); color: white; border: none; padding: 14px 20px; border-radius: 10px; font-weight: 600; cursor: pointer; width: 100%; transition: background 0.3s; }
        .access-btn:hover { background: linear-gradient(135deg, #0052d4, #4fd8ff); }
        .loading { display: none; font-size: 0.9rem; color: #0061ff; margin-top: 10px; text-align: center; }
        .loading-spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s linear infinite; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        footer { text-align: center; margin-top: 50px; color: white; opacity: 0.8; font-size: 0.9rem; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-cloud"></i> Dropbox文件中心</h1>
            <p>通过永久链接访问您的Dropbox共享文件。</p>
        </header>
        
        <main class="card-grid">
            <!-- ENJOY AI 共享文件夹 -->
            <div class="folder-card" data-folder-id="enjoy_ai">
                <div class="card-icon"><i class="fas fa-share-alt"></i></div>
                <h3 class="card-title">ENJOY AI</h3>
                <p class="card-desc">ENJOY AI项目的共享文件夹。包含项目文件、数据集和资源。</p>
                <button class="access-btn" onclick="handleFolderClick('enjoy_ai')">
                    <span class="btn-text">打开文件夹</span>
                </button>
                <div id="loading-enjoy_ai" class="loading">
                    <i class="fas fa-spinner fa-spin"></i> 正在处理...
                </div>
            </div>
            
            <!-- WhalesBot 共享文件夹 -->
            <div class="folder-card" data-folder-id="whalesbot">
                <div class="card-icon"><i class="fas fa-robot"></i></div>
                <h3 class="card-title">WhalesBot</h3>
                <p class="card-desc">WhalesBot项目的共享文件夹。包含代码、资源和项目文件。</p>
                <button class="access-btn" onclick="handleFolderClick('whalesbot')">
                    <span class="btn-text">打开文件夹</span>
                </button>
                <div id="loading-whalesbot" class="loading">
                    <i class="fas fa-spinner fa-spin"></i> 正在处理...
                </div>
            </div>
        </main>
        
        <footer>
            <p>© 2024 Dropbox永久链接服务</p>
        </footer>
    </div>

    <script>
        const API_BASE_URL = window.location.origin;
        // 当前可用的文件夹ID列表，与 server.js 配置完全一致
        const CURRENT_FOLDER_IDS = ['enjoy_ai', 'whalesbot'];

        async function handleFolderClick(folderId) {
            const button = document.querySelector(`[data-folder-id="${folderId}"] .access-btn`);
            const btnText = button.querySelector('.btn-text');
            const loadingEl = document.getElementById(`loading-${folderId}`);

            button.disabled = true;
            btnText.innerHTML = '<span class="loading-spinner"></span>处理中...';
            if (loadingEl) loadingEl.style.display = 'block';

            try {
                const response = await fetch(`${API_BASE_URL}/api/link/${folderId}`);
                if (!response.ok) throw new Error(`请求失败: ${response.status}`);
                const data = await response.json();
                if (data && data.url) {
                    window.open(data.url, '_blank'); // 在新标签页打开Dropbox链接
                } else {
                    throw new Error('未收到有效链接');
                }
            } catch (error) {
                console.error('打开链接失败:', error);
                alert('无法访问文件，请稍后重试。');
            } finally {
                setTimeout(() => {
                    button.disabled = false;
                    btnText.textContent = '打开文件夹';
                    if (loadingEl) loadingEl.style.display = 'none';
                }, 1000);
            }
        }

        // 页面加载时，可选的健康检查（用于调试）
        window.addEventListener('load', async () => {
            try {
                const response = await fetch(`${API_BASE_URL}/api/health`);
                if (response.ok) {
                    const data = await response.json();
                    console.log('服务状态正常，可用文件夹:', data.available_folders);
                }
            } catch (error) {
                console.log('服务健康检查失败（可能不影响使用）:', error);
            }
        });
    </script>
</body>
</html>
